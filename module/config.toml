# ============================================================
# 配置说明
# ============================================================
#
# 【架构】按需调度（无需选择模式）
#
# 所有应用自动走统一执行流：
#   ① hook_build_fields (JNI)         — 始终执行（如有设备字段）
#   ② cow_props::apply_cow_spoof (COW) — 始终执行（如有 prop_map）
#   ③ companion CPU spoof              — 按需（仅 cpu_spoof 配置时）
#   ④ companion resetprop              — 按需（仅 __DELETE__ 属性时）
#   ⑤ DlClose                          — 始终执行（零模块驻留）
#
# 用户不再需要理解 lite/full/companion 的区别。
#
# 【配置方式】
# 1. 模板包名列表 - 在模板的 packages 中直接添加包名
# 2. 直接配置 - 使用 [[apps]] 直接指定设备信息
#
# 【优先级】
# 字段优先级：[[apps]] 直接配置 > 模板 packages 列表
#
# 【COW 引擎】
# - 通过 mmap COW 重映射 prop_area 文件，直接覆写属性内存
# - 覆盖 __system_property_get 和 __system_property_read_callback（同一份 mmap）
# - 无 GOT/PLT 修改，无 JNI native method 替换
# - 模块写完即 DlClose，/proc/self/maps 干净
#
# 【降级路径】
# 如果 COW 在某设备不兼容，可为特定 app 设置 mode = "full"：
#   [[apps]]
#   package = "com.example.app"
#   mode = "full"
# 这将回退到旧 PLT hook 实现（模块驻留内存，隐蔽性较低）。
#
# 【__DELETE__ 标记】
# 设置属性值为 "__DELETE__" 可通过 companion resetprop 删除该属性。
# 设置属性值为 "__EMPTY__" 将属性值设为空字符串。
#
# 【CPU 伪装】
# 在模板或 [[apps]] 中设置 cpu_spoof 引用 cpu_presets 预设，
# 或直接设置 cpu_spoof_custom 自定义 /proc/cpuinfo 内容。
# 有 CPU 伪装配置时，自动通过 companion fork + setns + bind mount 实现。
